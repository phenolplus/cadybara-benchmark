<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Compare Runs · Cadybara Experiments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="/static/app.css" rel="stylesheet">
    <link href="/static/compare.css" rel="stylesheet">
  </head>
  <body class="compare-page">
    <header class="compare-header border-bottom bg-body">
      <div class="container-fluid py-3">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
          <div>
            <div class="text-body-secondary small mb-1" id="compareMeta"></div>
            <h1 class="h4 mb-1">Compare runs</h1>
            <p class="text-body-secondary mb-0">Drag any viewport to rotate all models together.</p>
          </div>
          <a class="btn btn-outline-secondary btn-sm" id="backLink" href="/experiments">Back to experiment</a>
        </div>
      </div>
    </header>
    <main class="container-fluid py-4">
      <div id="compareGrid" class="compare-grid"></div>
      <div id="compareStatus" class="text-body-secondary small" role="status"></div>
    </main>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/static/compare.js"></script>
  </body>
</html>
